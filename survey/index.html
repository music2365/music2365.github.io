<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music2365 Survey</title>

  <style>

    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }

    #nextBtn,
    #skipBtn {
      position: fixed;

      padding: 14px 28px;

      font-size: 22px;

      border: none;
      border-radius: 12px;

      background: #1db954;
      color: black;

      cursor: pointer;
    }

    /* NEXT BUTTON */
    #nextBtn {
      bottom: 30px;
      right: 30px;

      display: none;
    }

    /* SKIP BUTTON */
    #skipBtn {
      top: 20px;
      right: 20px;
    }

  </style>
</head>
<body>

  <!-- IFRAME -->
  <iframe src="https://https://forms.gle/W3SLxQLuyeiBambk7"></iframe>

  <!-- SKIP -->
  <button id="skipBtn">
    Skip
  </button>

  <!-- NEXT -->
  <button id="nextBtn">
    Next
  </button>

  <script>

    // SHOW NEXT AFTER 10 SEC
    setTimeout(() => {
      document.getElementById("nextBtn").style.display = "block";
    }, 10000);

    // NEXT PAGE
    document.getElementById("nextBtn").onclick = () => {
      window.location.href = "/survey/page2.html";
    };

    // SKIP SURVEY
    document.getElementById("skipBtn").onclick = () => {

      sessionStorage.setItem("surveyDone", "true");

      window.location.href = "/";

    };

  </script>

</body>
</html>
