<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Musify</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">

    <h1>
      Musify |
      <span>Song Library</span>
    </h1>

    <div class="search-wrap">

      <span class="search-icon">⌕</span>

      <input
        type="text"
        id="search"
        placeholder="Search Song Title or Artist"
        oninput="filterSongs()"
      />

    </div>

  </div>

  <!-- SONGS -->
  <div id="songList"></div>

  <!-- PLAYER -->
  <div class="player">

    <!-- SONG INFO -->
    <div class="track-info">

      <div class="title-wrap">
        <div id="songTitle">Select a song</div>
        <div id="songArtist">—</div>
      </div>

    </div>

 <!-- CONTROLS -->
<div class="controls">

  <img
    class="skipBtn"
    src="images/image.png"
    alt="Back 15 Seconds"
    onclick="back15()"
  />

  <img
    id="playPauseBtn"
    src="images/play-button.png"
    alt="Play / Pause"
    onclick="togglePlay()"
  />

  <img
    class="skipBtn"
    src="images/Double-Tailless-Triangle-Arrow-Right--Streamline-Sharp.png"
    alt="Forward 15 Seconds"
    onclick="forward15()"
  />

  <img
    id="loopBtn"
    src="images/loop-off.png"
    alt="Loop"
    onclick="toggleLoop()"
  />

</div>

    <!-- PROGRESS -->
    <div class="time">

      <span id="current">0:00</span>

      <input
        type="range"
        id="progress"
        value="0"
        min="0"
        max="100"
        step="0.0001"
      />

      <span id="duration">0:00</span>

    </div>

  </div>

  <!-- AUDIO -->
  <audio id="audio"></audio>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
