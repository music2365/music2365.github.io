<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Music2365</title>

  <!-- FAVICON -->
  <link rel="icon" href="images/logo.png" type="image/png">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- SURVEY REDIRECT -->
  <script>

    // TURN SURVEY ON / OFF
    const surveyEnabled = true;

    // Redirect to survey if enabled
    if (
      surveyEnabled &&
      !sessionStorage.getItem("surveyDone")
    ) {
      window.location.href = "/survey";
    }

  </script>

</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">

    <!-- LOGO + TITLE -->
    <div class="logo-title">

      <img
        src="images/logo.png"
        alt="Music2365 Logo"
        id="logo"
      />

      <h1>
        Music2365 |
        <span>Song Library</span>
      </h1>

    </div>

    <!-- SEARCH -->
    <div class="search-wrap">

      <span class="search-icon">⌕</span>

      <input
        type="text"
        id="search"
        placeholder="Search Song Title or Artist"
        oninput="filterSongs()"
      />

    </div>

  </div>

  <!-- TOP 100 SECTION -->
  <div id="top100Section">

    <h2 id="top100Title">
      Top 100 Spotify Songs 2026
    </h2>

    <div id="top100List"></div>

  </div>

  <!-- SEARCH RESULTS -->
  <div id="songList"></div>

  <!-- PLAYER -->
  <div class="player">

    <!-- SONG INFO -->
    <div class="track-info">

      <div class="title-wrap">

        <div id="songTitle">
          Select a song
        </div>

        <div id="songArtist">
          —
        </div>

      </div>

    </div>

    <!-- CONTROLS -->
    <div class="controls">

      <!-- BACK -->
      <img
        class="skipBtn"
        src="images/backward-button.png"
        alt="Previous"
        onclick="prev()"
      />

      <!-- PLAY / PAUSE -->
      <img
        id="playPauseBtn"
        src="images/play-button.png"
        alt="Play / Pause"
        onclick="togglePlay()"
      />

      <!-- NEXT -->
      <img
        class="skipBtn"
        src="images/forward-button.png"
        alt="Next"
        onclick="next()"
      />

    </div>

    <!-- PROGRESS -->
    <div class="time">

      <span id="current">0:00</span>

      <input
        type="range"
        id="progress"
        value="0"
        min="0"
        max="100"
        step="0.0001"
      />

      <span id="duration">0:00</span>

    </div>

  </div>

  <!-- AUDIO -->
  <audio id="audio"></audio>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
