<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Music2365</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">

    <div class="logo-title">

      <img
        src="images/logo.png"
        alt="Musify Logo"
        id="logo"
      />

     <h1>
      Musify |
      <span>Song Library</span>
     </h1>

</div>

    <div class="search-wrap">

      <span class="search-icon">⌕</span>

      <input
        type="text"
        id="search"
        placeholder="Search Song Title or Artist"
        oninput="filterSongs()"
      />

    </div>

  </div>
    <div id="top100Section">

      <h2 id="top100Title">
        Top 100 Streamed Spotify Songs
      </h2>

    <div id="top100List"></div>

  </div>
  <!-- SONGS -->
  <div id="songList"></div>

  <!-- PLAYER -->
  <div class="player">

    <!-- SONG INFO -->
    <div class="track-info">

      <div class="title-wrap">
        <div id="songTitle">Select a song</div>
        <div id="songArtist">—</div>
      </div>

    </div>

 <!-- CONTROLS -->
<div class="controls">

  <img
    class="skipBtn"
    src="images/image.png"
    alt="Back 15 Seconds"
    onclick="back15()"
  />

  <img
    id="playPauseBtn"
    src="images/play.png"
    alt="Play / Pause"
    onclick="togglePlay()"
  />

  <img
    class="skipBtn"
    src="images/Double-Tailless-Triangle-Arrow-Right--Streamline-Sharp.png"
    alt="Forward 15 Seconds"
    onclick="forward15()"
  />

  <img
    id="loopBtn"
    src="images/repeatgreen.png"
    alt="Loop"
    onclick="toggleLoop()"
  />  

</div>

    <!-- PROGRESS -->
    <div class="time">

      <span id="current">0:00</span>

      <input
        type="range"
        id="progress"
        value="0"
        min="0"
        max="100"
        step="0.0001"
      />

      <span id="duration">0:00</span>

    </div>

  </div>

  <!-- AUDIO -->
  <audio id="audio"></audio>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
